<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Habit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <main>
      <section class="screen is-active" data-screen="home">
        <header class="topbar">
          <div>
            <p class="topbar__label" id="todayLabel">今天</p>
            <h1>首页</h1>
          </div>
          <div class="progress-pill" id="todayProgress">0/0</div>
        </header>

        <section class="card card--progress">
          <div class="ring" aria-hidden="true">
            <svg viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="42" class="ring__base"></circle>
              <circle cx="50" cy="50" r="42" class="ring__value" id="progressRing"></circle>
            </svg>
            <strong id="progressRate">0%</strong>
          </div>
          <p class="card__hint" id="progressMessage">从一个最小动作开始。</p>
        </section>

        <section class="card">
          <div class="card__head">
            <h2>今日任务</h2>
            <span id="streakSummary">连续 0 天</span>
          </div>
          <div id="habitList" class="habit-list"></div>
        </section>

        <section class="card">
          <div class="card__head">
            <h2>快速添加习惯</h2>
          </div>
          <form id="habitForm" class="habit-form">
            <input id="habitName" type="text" maxlength="24" placeholder="例如：晨跑 20 分钟" required>
            <input id="habitGoal" type="text" maxlength="40" placeholder="例如：先完成，再完美">
            <button class="btn-primary" type="submit">添加到今日任务</button>
          </form>
          <div class="preset-row" id="presetRow"></div>
        </section>
      </section>

      <section class="screen" data-screen="timer">
        <header class="topbar">
          <div>
            <p class="topbar__label">专注与计时</p>
            <h1>计时</h1>
          </div>
        </header>

        <section class="card">
          <div class="card__head">
            <h2>番茄钟</h2>
            <div class="segmented">
              <button class="segmented__btn is-active" data-pomo-minutes="25" type="button">25</button>
              <button class="segmented__btn" data-pomo-minutes="50" type="button">50</button>
            </div>
          </div>
          <div class="timer-main" id="pomoDisplay">25:00</div>
          <div class="timer-actions">
            <button id="pomoStart" class="btn-primary" type="button">开始</button>
            <button id="pomoPause" class="btn-ghost" type="button">暂停</button>
            <button id="pomoReset" class="btn-ghost" type="button">重置</button>
          </div>
        </section>

        <section class="card">
          <div class="card__head">
            <h2>正向计时</h2>
          </div>
          <div class="timer-main" id="stopwatchDisplay">00:00:00</div>
          <div class="timer-actions">
            <button id="swStart" class="btn-primary" type="button">开始</button>
            <button id="swPause" class="btn-ghost" type="button">暂停</button>
            <button id="swReset" class="btn-ghost" type="button">清零</button>
          </div>
        </section>
      </section>

      <section class="screen" data-screen="stats">
        <header class="topbar">
          <div>
            <p class="topbar__label">复盘</p>
            <h1>统计</h1>
          </div>
          <div class="segmented" role="tablist" aria-label="统计周期">
            <button class="segmented__btn is-active" data-range="week" type="button">周</button>
            <button class="segmented__btn" data-range="month" type="button">月</button>
            <button class="segmented__btn" data-range="year" type="button">年</button>
          </div>
        </header>

        <section class="stats-grid">
          <article class="mini-card"><p>完成率</p><strong id="statRate">0%</strong></article>
          <article class="mini-card"><p>打卡次数</p><strong id="statCheckins">0</strong></article>
          <article class="mini-card"><p>连续天数</p><strong id="statStreak">0</strong></article>
        </section>

        <section class="card">
          <div class="card__head">
            <h2>热力图</h2>
          </div>
          <div id="heatmapGrid" class="heatmap-grid"></div>
        </section>
      </section>

      <section class="screen" data-screen="settings">
        <header class="topbar">
          <div>
            <p class="topbar__label">个性化</p>
            <h1>设置</h1>
          </div>
        </header>

        <section class="card">
          <div class="card__head">
            <h2>主题色</h2>
          </div>
          <div class="theme-swatches" id="themeSwatches">
            <button type="button" data-accent="#e86f2d" style="--sw:#e86f2d" class="swatch is-active"></button>
            <button type="button" data-accent="#16a085" style="--sw:#16a085" class="swatch"></button>
            <button type="button" data-accent="#2563eb" style="--sw:#2563eb" class="swatch"></button>
            <button type="button" data-accent="#dc2626" style="--sw:#dc2626" class="swatch"></button>
          </div>
        </section>

        <section class="card">
          <div class="setting-row">
            <div>
              <h3>深色模式</h3>
              <p>切换后整个界面立即生效</p>
            </div>
            <label class="switch">
              <input id="darkModeToggle" type="checkbox">
              <span></span>
            </label>
          </div>
        </section>
      </section>
    </main>
  </div>

  <nav class="mobile-nav" aria-label="主导航">
    <button type="button" class="mobile-nav__item is-active" data-screen="home"><span>首页</span></button>
    <button type="button" class="mobile-nav__item" data-screen="timer"><span>计时</span></button>
    <button type="button" class="mobile-nav__item" data-screen="stats"><span>统计</span></button>
    <button type="button" class="mobile-nav__item" data-screen="settings"><span>设置</span></button>
  </nav>

  <template id="habitItemTemplate">
    <article class="habit-item">
      <div class="habit-item__left">
        <span class="habit-item__icon"></span>
        <div>
          <h3 class="habit-item__title"></h3>
          <p class="habit-item__goal"></p>
        </div>
      </div>
      <button class="habit-item__check" type="button" aria-label="打卡"></button>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
