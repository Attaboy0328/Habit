<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div class="hero__copy">
        <p class="eyebrow">Daily Momentum</p>
        <h1>把坚持这件事，做得更有成就感。</h1>
        <p class="hero__text">
          支持电脑和手机两种查看模式，预设了常用习惯库，点一下就能快速加入。
        </p>
      </div>

      <div class="hero__card">
        <div class="hero__topline">
          <div>
            <p class="hero__date" id="todayLabel"></p>
            <p class="hero__subtext" id="modeHint">当前为自动模式</p>
          </div>
          <div class="hero-actions">
            <button type="button" class="hero-action-btn" id="modeToggle" aria-label="切换显示模式">⚙</button>
            <div class="view-switch" id="viewSwitch" role="menu" aria-label="显示模式切换">
              <button type="button" class="view-switch__btn is-active" data-view="auto">自动</button>
              <button type="button" class="view-switch__btn" data-view="desktop">电脑</button>
              <button type="button" class="view-switch__btn" data-view="mobile">手机</button>
            </div>
          </div>
        </div>
        <div class="hero__progress">
          <span id="completedCount">0</span>
          <small>/ <span id="totalCount">0</span> 个习惯完成</small>
        </div>
        <div class="hero__bar">
          <div class="hero__bar-fill" id="progressBar"></div>
        </div>
        <p class="hero__message" id="progressMessage"></p>
      </div>
    </header>

    <main class="dashboard" id="dashboard">
      <section class="panel panel--today">
        <div class="panel__header">
          <div>
            <p class="section-kicker">Today</p>
            <h2>今日任务</h2>
          </div>
          <span class="badge" id="streakSummary">连续坚持 0 天</span>
        </div>
        <div id="habitList" class="habit-list"></div>
      </section>

      <section class="panel panel--form">
        <div class="panel__header">
          <div>
            <p class="section-kicker">New Habit</p>
            <h2>添加自定义项目</h2>
          </div>
        </div>

        <form id="habitForm" class="habit-form">
          <label class="input-group">
            <span>习惯名称</span>
            <input id="habitName" name="habitName" type="text" maxlength="24" placeholder="比如：晨跑 20 分钟" required>
          </label>

          <label class="input-group">
            <span>激励文案</span>
            <input id="habitGoal" name="habitGoal" type="text" maxlength="40" placeholder="比如：先完成，再完美">
          </label>

          <button type="submit" class="primary-button">创建今日打卡项</button>
        </form>
      </section>

      <section class="panel panel--library">
        <div class="panel__header">
          <div>
            <p class="section-kicker">Library</p>
            <h2>习惯库</h2>
          </div>
        </div>
        <div class="library-toolbar">
          <input id="presetSearch" class="library-search" type="search" placeholder="搜索习惯，例如：跑步、阅读、喝水">
          <div class="library-tabs" role="tablist" aria-label="习惯分类">
            <button type="button" class="library-tab is-active" data-category="all">全部</button>
            <button type="button" class="library-tab" data-category="health">健康</button>
            <button type="button" class="library-tab" data-category="study">学习</button>
            <button type="button" class="library-tab" data-category="life">生活</button>
            <button type="button" class="library-tab" data-category="work">工作</button>
          </div>
        </div>
        <div class="library-hint">点击任意习惯卡片即可加入今日打卡列表。</div>
        <div id="presetGrid" class="preset-grid"></div>
      </section>

      <section class="panel panel--calendar">
        <div class="panel__header">
          <div>
            <p class="section-kicker">History</p>
            <h2>最近 7 天热力图</h2>
          </div>
          <div class="stats-toggle" role="tablist" aria-label="统计周期切换">
            <button type="button" class="stats-toggle__btn is-active" data-range="week">周</button>
            <button type="button" class="stats-toggle__btn" data-range="month">月</button>
            <button type="button" class="stats-toggle__btn" data-range="year">年</button>
          </div>
        </div>
        <div class="stats-summary">
          <div class="stats-summary__card">
            <span class="stats-summary__label">打卡数量</span>
            <strong id="checkinTotal">0</strong>
          </div>
          <div class="stats-summary__card">
            <span class="stats-summary__label">完成习惯数</span>
            <strong id="habitDoneTotal">0</strong>
          </div>
          <div class="stats-summary__card">
            <span class="stats-summary__label">平均完成率</span>
            <strong id="averageRate">0%</strong>
          </div>
        </div>
        <div id="calendarGrid" class="calendar-grid"></div>
      </section>
    </main>

    <button class="fab-button" id="fabAdd" type="button" aria-label="添加习惯">+</button>
  </div>

  <nav class="mobile-nav" aria-label="手机导航">
    <button type="button" class="mobile-nav__item is-active" data-screen="today">
      <span class="mobile-nav__icon">🏠</span>
      <span>今日</span>
    </button>
    <button type="button" class="mobile-nav__item" data-screen="add">
      <span class="mobile-nav__icon">➕</span>
      <span>添加</span>
    </button>
    <button type="button" class="mobile-nav__item" data-screen="library">
      <span class="mobile-nav__icon">🗂️</span>
      <span>习惯库</span>
    </button>
    <button type="button" class="mobile-nav__item" data-screen="stats">
      <span class="mobile-nav__icon">📊</span>
      <span>统计</span>
    </button>
  </nav>

  <template id="habitItemTemplate">
    <article class="habit-card">
      <div class="habit-card__icon"></div>
      <div class="habit-card__main">
        <div class="habit-card__text">
          <h3 class="habit-card__title"></h3>
          <p class="habit-card__goal"></p>
        </div>
        <div class="habit-card__meta">
          <span class="streak-pill"></span>
          <button class="check-button" type="button"></button>
        </div>
      </div>
    </article>
  </template>

  <template id="presetCardTemplate">
    <button class="preset-card" type="button">
      <span class="preset-card__icon"></span>
      <span class="preset-card__name"></span>
      <span class="preset-card__meta"></span>
    </button>
  </template>

  <script src="app.js"></script>
</body>
</html>
