<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Habit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <main>
      <section class="screen is-active" data-screen="home">
        <header class="topbar">
          <div>
            <p class="topbar__label" id="todayLabel">今天</p>
            <h1>欢迎回来 👋</h1>
            <p class="topbar__sub" id="welcomeSub">开始你的今日节奏</p>
          </div>
          <div class="progress-pill" id="todayProgress">0/0</div>
        </header>

        <section class="card card--progress">
          <div class="ring" aria-hidden="true">
            <svg viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="42" class="ring__base"></circle>
              <circle cx="50" cy="50" r="42" class="ring__value" id="progressRing"></circle>
            </svg>
            <strong id="progressRate">0%</strong>
          </div>
          <p class="card__hint" id="progressMessage">先从一件小事开始。</p>
        </section>

        <section class="card">
          <div class="card__head">
            <h2>今日任务</h2>
            <span id="streakSummary">连续 0 天</span>
          </div>
          <div id="habitList" class="habit-list"></div>
        </section>

        <section class="card">
          <div class="card__head">
            <h2>快速添加习惯</h2>
          </div>
          <div class="category-tabs" id="categoryTabs"></div>
          <div class="preset-grid" id="presetGrid"></div>
        </section>
      </section>

      <section class="screen" data-screen="timer">
        <header class="topbar">
          <div>
            <p class="topbar__label">专注时钟</p>
            <h1>番茄钟 + 正向计时</h1>
          </div>
        </header>

        <section class="card timer-card">
          <div class="card__head">
            <h2>番茄钟</h2>
            <div class="quick-minutes">
              <button type="button" class="quick-btn" data-pomo-minutes="5">5m</button>
              <button type="button" class="quick-btn" data-pomo-minutes="10">10m</button>
              <button type="button" class="quick-btn" data-pomo-minutes="15">15m</button>
              <button type="button" class="quick-btn" data-pomo-minutes="30">30m</button>
            </div>
          </div>
          <div class="timer-main" id="pomoDisplay">25:00</div>
          <div class="time-input-row">
            <label>自定义分钟</label>
            <input id="pomoCustomMinutes" type="number" min="1" max="180" value="25">
            <button id="pomoApply" type="button" class="btn-ghost">应用</button>
          </div>
          <div class="timer-actions">
            <button id="pomoStart" class="btn-primary" type="button">开始</button>
            <button id="pomoPause" class="btn-ghost" type="button">暂停</button>
            <button id="pomoReset" class="btn-ghost" type="button">重置</button>
          </div>
        </section>

        <section class="card timer-card">
          <div class="card__head">
            <h2>正向计时</h2>
          </div>
          <div class="timer-main" id="stopwatchDisplay">00:00:00</div>
          <div class="timer-actions">
            <button id="swStart" class="btn-primary" type="button">开始</button>
            <button id="swPause" class="btn-ghost" type="button">暂停</button>
            <button id="swReset" class="btn-ghost" type="button">清零</button>
          </div>
        </section>
      </section>

      <section class="screen" data-screen="stats">
        <header class="topbar">
          <div>
            <p class="topbar__label">复盘中心</p>
            <h1>统计</h1>
          </div>
          <div class="segmented" role="tablist" aria-label="统计周期">
            <button class="segmented__btn is-active" data-range="week" type="button">周</button>
            <button class="segmented__btn" data-range="month" type="button">月</button>
            <button class="segmented__btn" data-range="year" type="button">年</button>
          </div>
        </header>

        <section class="stats-grid">
          <article class="mini-card"><p>完成率</p><strong id="statRate">0%</strong></article>
          <article class="mini-card"><p>打卡次数</p><strong id="statCheckins">0</strong></article>
          <article class="mini-card"><p>连续天数</p><strong id="statStreak">0</strong></article>
        </section>

        <section class="card">
          <div class="card__head card__head--stack">
            <div>
              <h2>特定项目热力图</h2>
              <p class="subtle">选择一个习惯查看单项热力分布</p>
            </div>
            <select id="habitHeatmapSelect" class="select"></select>
          </div>
          <div class="weekday-labels" id="habitWeekdayLabels"></div>
          <div class="monthly-heatmap" id="habitMonthlyHeatmap"></div>
        </section>

        <section class="card">
          <div class="card__head card__head--stack">
            <div>
              <h2>周热力图</h2>
              <p class="subtle">按本周一到周日展示关键习惯</p>
            </div>
            <span class="week-range" id="weekRangeLabel"></span>
          </div>
          <div class="weekday-labels" id="weeklyHeatmapWeekdays"></div>
          <div class="weekly-heatmap" id="weeklyHeatmap"></div>
        </section>

        <section class="card">
          <div class="card__head card__head--stack">
            <div>
              <h2 id="overallHeatmapTitle">周期热力图</h2>
              <p class="subtle">周 / 月 / 年视图都显示月份与周几标记</p>
            </div>
          </div>
          <div class="weekday-labels" id="overallWeekdayLabels"></div>
          <div class="overall-heatmap" id="overallHeatmap"></div>
        </section>
      </section>

      <section class="screen" data-screen="settings">
        <header class="topbar">
          <div>
            <p class="topbar__label">个性化</p>
            <h1>设置</h1>
          </div>
        </header>

        <section class="card">
          <div class="card__head card__head--stack">
            <div>
              <h2>主题色</h2>
              <p class="subtle">含高级配色与粉色主题</p>
            </div>
          </div>
          <div class="theme-swatches" id="themeSwatches">
            <button type="button" data-accent="#e86f2d" style="--sw:#e86f2d" class="swatch is-active" title="活力橙"></button>
            <button type="button" data-accent="#ff4d8d" style="--sw:#ff4d8d" class="swatch" title="樱花粉"></button>
            <button type="button" data-accent="#16a085" style="--sw:#16a085" class="swatch" title="翡翠绿"></button>
            <button type="button" data-accent="#2563eb" style="--sw:#2563eb" class="swatch" title="深海蓝"></button>
            <button type="button" data-accent="#7c3aed" style="--sw:#7c3aed" class="swatch" title="皇家紫"></button>
            <button type="button" data-accent="#c78b22" style="--sw:#c78b22" class="swatch" title="鎏金"></button>
            <button type="button" data-accent="#0f766e" style="--sw:#0f766e" class="swatch" title="墨玉青"></button>
            <button type="button" data-accent="#be123c" style="--sw:#be123c" class="swatch" title="酒红"></button>
          </div>
        </section>

        <section class="card">
          <div class="setting-row">
            <div>
              <h3>深色模式</h3>
              <p>切换后全局生效</p>
            </div>
            <label class="switch">
              <input id="darkModeToggle" type="checkbox">
              <span></span>
            </label>
          </div>
        </section>
      </section>
    </main>
  </div>

  <nav class="mobile-nav" aria-label="主导航">
    <button type="button" class="mobile-nav__item is-active" data-screen="home"><span>首页</span></button>
    <button type="button" class="mobile-nav__item" data-screen="timer"><span>计时</span></button>
    <button type="button" class="mobile-nav__item" data-screen="stats"><span>统计</span></button>
    <button type="button" class="mobile-nav__item" data-screen="settings"><span>设置</span></button>
  </nav>

  <template id="habitItemTemplate">
    <article class="habit-item">
      <div class="habit-item__left">
        <span class="habit-item__icon"></span>
        <div>
          <h3 class="habit-item__title"></h3>
          <p class="habit-item__goal"></p>
        </div>
      </div>
      <button class="habit-item__check" type="button" aria-label="打卡"></button>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
